name: Coleta Notícias

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"

jobs:
  executar-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        uf_block:
          - "AC,AL,AM,AP"
          - "BA,CE,DF,ES"
          - "GO,MA,MG,MS"
          - "MT,PA,PB,PE,PI"
          - "PR,RJ,RN,RO,RR"
          - "RS,SC,SE,SP,TO"
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Preparar credenciais Google
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "Secret GOOGLE_APPLICATION_CREDENTIALS_JSON não configurado no repositório."
            exit 1
          fi
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          python -c "import json; json.load(open('credentials.json', encoding='utf-8')); print('credentials.json válido')"

      - name: Executar script (bloco ${{ matrix.uf_block }})
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          SPREADSHEET_ID: ${{ secrets.SHEET_ID_ESTADOS }}
          UF_FILTER: ${{ matrix.uf_block }}
          MAX_NOTICIAS_POR_FONTE: ${{ vars.MAX_NOTICIAS_POR_FONTE }}
          MODO_RAPIDO: "1"
          ENABLE_DATE_ENRICHMENT: "0"
        run: |
          echo "Executando bloco de UFs: $UF_FILTER"
          python geral2.py

name: Coleta Notícias

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  executar-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID }}
          MAX_NOTICIAS_POR_FONTE: ${{ vars.MAX_NOTICIAS_POR_FONTE }}
          UF_FILTER: ${{ vars.UF_FILTER }}
          MODO_RAPIDO: ${{ vars.MODO_RAPIDO }}
          ENABLE_DATE_ENRICHMENT: ${{ vars.ENABLE_DATE_ENRICHMENT }}
        run: python geral2.py
